quarkus.rest.path=/api
quarkus.datasource.devservices.enabled=false

# Database Configuration
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER}
quarkus.datasource.password=${DB_PASSWORD}
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:${DB_PORT}/${INCIDENT_SVC_DB_NAME}

# Flyway Migrations
quarkus.flyway.migrate-at-start=true
quarkus.flyway.schemas=public
quarkus.flyway.baseline-on-migrate=true

quarkus.hibernate-orm.dialect=org.hibernate.dialect.PostgreSQLDialect
mp.orm.id-generation-strategy=identity

# CORS Configuration
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${FRONTEND_URL}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept, authorization, content-type, x-requested-with

# Keycloak OIDC Verification
# In Docker, we use the container name. In dev mode, it overrides to localhost.
quarkus.oidc.auth-server-url=http://drcp-keycloak:${KEYCLOAK_PORT}/realms/${KEYCLOAK_REALM}
quarkus.oidc.client-id=${KEYCLOAK_CLIENT_ID}
quarkus.oidc.application-type=service
quarkus.oidc.credentials.secret=${KEYCLOAK_CLIENT_SECRET}
quarkus.keycloak.devservices.enabled=false

# Role Mapping (Instructs Quarkus where to find Keycloak roles in the JWT)
quarkus.oidc.roles.role-claim-path=realm_access/roles

# Local Dev Overrides
%dev.quarkus.http.port=${INCIDENT_SERVICE_PORT}
%dev.quarkus.oidc.auth-server-url=http://localhost:${KEYCLOAK_PORT}/realms/${KEYCLOAK_REALM}