services:

  # ─── PostgreSQL (Incident) ─────────────────────────────────────────────────
  postgres-incident:
    image: postgres:17
    container_name: drcp-incident-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DEFAULT_DB}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - drcp-incident-db-data:/var/lib/postgresql/data
    networks:
      - drcp-incident-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Incident Service ──────────────────────────────────────────────────────
  incident-service:
    build:
      context: .
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: drcp-incident-service
    restart: unless-stopped
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres-incident:5432/${INCIDENT_SVC_DB_NAME}
      QUARKUS_DATASOURCE_USERNAME: ${DB_USER}
      QUARKUS_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      QUARKUS_OIDC_AUTH_SERVER_URL: http://drcp-keycloak:${KEYCLOAK_PORT}/realms/${KEYCLOAK_REALM}
      QUARKUS_OIDC_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      QUARKUS_OIDC_CREDENTIALS_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
    ports:
      - "${INCIDENT_SERVICE_PORT}:8080"
    depends_on:
      postgres-incident:
        condition: service_healthy
    networks:
      - drcp-incident-net

# ─── External Network Link ───────────────────────────────────────────────────
# This allows both the Identity and Incident services to communicate with Keycloak
networks:
  drcp-incident-net:
    name: drcp_network
    external: true

volumes:
  drcp-incident-db-data:
    name: drcp-incident-db-data